<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E7 Affiliate</title>
<style>
body {
  font-family: Arial, sans-serif;
  margin:0;
  background:#f5f5f5;
}

header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#111;
  color:white;
  padding:15px 20px;
  position:sticky;
  top:0;
  z-index:100;
}

header .logo { font-size:1.5rem; font-weight:bold; }
.admin-btn { background:orange; color:white; border:none; padding:8px 12px; border-radius:5px; cursor:pointer; }

.container { max-width:1200px; margin:auto; padding:15px; }

/* ADMIN PANEL */
#adminPanel {
  background:#fff;
  padding:15px;
  border-radius:10px;
  margin-bottom:20px;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

#adminPanel input { width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid #ccc; }

/* SEARCH */
#search { width:100%; padding:10px; margin-bottom:20px; border-radius:8px; border:1px solid #ccc; }

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(200px,1fr));
  gap:20px;
}

.card {
  background:#fff;
  border-radius:12px;
  padding:15px;
  text-align:center;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
  transition: transform 0.2s, box-shadow 0.2s;
}

.card:hover {
  transform: translateY(-5px);
  box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

.card h4 { margin-bottom:10px; }

.buy { background:green; color:white; padding:8px 12px; border:none; border-radius:5px; cursor:pointer; text-decoration:none; display:inline-block; }

.delete { background:red; color:white; padding:5px 10px; border:none; border-radius:5px; cursor:pointer; margin-top:5px; }

.hidden { display:none; }
</style>
</head>
<body>

<header>
  <div class="logo">E7 Affiliate</div>
  <button class="admin-btn" onclick="login()">Admin Login</button>
</header>

<div class="container">

  <!-- ADMIN PANEL -->
  <div id="adminPanel" class="hidden">
    <h3>Add Product</h3>
    <input type="text" id="name" placeholder="Product Name">
    <input type="text" id="link" placeholder="Affiliate Link">
    <button onclick="addProduct()">Add Product</button>
  </div>

  <!-- SEARCH -->
  <input type="text" id="search" placeholder="Search products..." onkeyup="renderProducts()">

  <!-- PRODUCT GRID -->
  <div class="grid" id="products"></div>

</div>

<script>
let isAdmin = false;

// ADMIN LOGIN
function login() {
  const pass = prompt("Enter Admin Password:");
  if(pass === "P@ssw0rd") {
    isAdmin = true;
    document.getElementById("adminPanel").classList.remove("hidden");
    renderProducts();
  } else {
    alert("Wrong password");
  }
}

// LOCALSTORAGE FUNCTIONS
function getProducts() {
  return JSON.parse(localStorage.getItem("products")) || [];
}

function saveProducts(products) {
  localStorage.setItem("products", JSON.stringify(products));
}

// ADD PRODUCT
function addProduct() {
  const name = document.getElementById("name").value;
  const link = document.getElementById("link").value;

  if(!name || !link) { alert("Fill all fields!"); return; }

  const products = getProducts();
  products.push({name, link, createdAt: Date.now()});
  saveProducts(products);
  renderProducts();

  document.getElementById("name").value="";
  document.getElementById("link").value="";
}

// DELETE PRODUCT
function deleteProduct(index) {
  const products = getProducts();
  products.splice(index,1);
  saveProducts(products);
  renderProducts();
}

// RENDER PRODUCTS
function renderProducts() {
  const container = document.getElementById("products");
  container.innerHTML = "";

  const searchValue = document.getElementById("search").value.toLowerCase();

  const products = getProducts().filter(p => p.name.toLowerCase().includes(searchValue));

  products.forEach((p,index)=>{
    container.innerHTML += `
      <div class="card">
        <h4>${p.name}</h4>
        <a href="${p.link}" target="_blank" class="buy">Buy Now</a>
        ${isAdmin ? `<button class="delete" onclick="deleteProduct(${index})">Delete</button>` : ""}
      </div>
    `;
  });
}

// INITIAL RENDER
renderProducts();
</script>

</body>
</html>
